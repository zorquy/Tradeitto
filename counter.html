<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="robots" content="noindex, nofollow" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tradeitto · 7 de junio 2026 · Bilbao</title>
  <link rel="icon" href="assets/logo.png" type="image/png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,700;1,9..144,400;1,9..144,700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: 'Space Grotesk', sans-serif;
      background: #0e0818;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      -webkit-font-smoothing: antialiased;
      position: relative;
    }

    /* ── Fondo con blobs ── */
    .bg-blob {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      filter: blur(80px);
      z-index: 0;
    }
    .bg-blob-1 {
      width: 600px; height: 600px;
      background: rgba(123, 53, 193, 0.25);
      top: -200px; left: -150px;
    }
    .bg-blob-2 {
      width: 500px; height: 500px;
      background: rgba(42, 184, 184, 0.15);
      bottom: -180px; right: -120px;
    }
    .bg-blob-3 {
      width: 300px; height: 300px;
      background: rgba(201, 168, 48, 0.1);
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
    }

    /* ── Contenido ── */
    .counter-wrap {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      text-align: center;
      padding: 0 24px;
    }

    .counter-logo {
      width: 90px;
      height: 90px;
      object-fit: contain;
      margin-bottom: 28px;
      filter: drop-shadow(0 4px 24px rgba(123,53,193,0.5));
    }

    .counter-label {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.4);
      margin-bottom: 12px;
    }

    .counter-days {
      font-family: 'Fraunces', serif;
      font-size: clamp(7rem, 22vw, 14rem);
      font-weight: 700;
      font-style: italic;
      line-height: 0.9;
      background: linear-gradient(135deg, #c9a830 0%, #fff 45%, #8de8e8 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.04em;
    }

    .counter-days-label {
      font-family: 'Fraunces', serif;
      font-size: clamp(1.4rem, 4vw, 2.2rem);
      font-weight: 700;
      font-style: italic;
      color: rgba(255,255,255,0.55);
      margin-top: 8px;
      margin-bottom: 40px;
      letter-spacing: -0.02em;
    }

    .counter-date {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 50px;
      padding: 10px 22px;
      font-size: 0.9rem;
      font-weight: 600;
      color: rgba(255,255,255,0.75);
      margin-bottom: 36px;
      backdrop-filter: blur(10px);
    }
    .counter-date-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #c9a830;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.4; transform: scale(0.7); }
    }

    .counter-cta {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, #7b35c1, #5a1fa0);
      color: #fff;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.92rem;
      font-weight: 600;
      padding: 13px 28px;
      border-radius: 50px;
      text-decoration: none;
      transition: filter 0.2s, transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 8px 32px rgba(123,53,193,0.4);
    }
    .counter-cta:hover {
      filter: brightness(1.15);
      transform: translateY(-2px);
      box-shadow: 0 12px 40px rgba(123,53,193,0.55);
    }

    /* Estado: evento comenzado */
    .counter-started {
      font-family: 'Fraunces', serif;
      font-style: italic;
      font-size: clamp(2rem, 6vw, 3.5rem);
      font-weight: 700;
      background: linear-gradient(135deg, #c9a830, #8de8e8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-align: center;
    }

    /* ── Footer discreto ── */
    .counter-footer {
      position: fixed;
      bottom: 24px;
      left: 0; right: 0;
      text-align: center;
      font-size: 0.75rem;
      color: rgba(255,255,255,0.2);
      z-index: 2;
    }
    .counter-footer a {
      color: rgba(255,255,255,0.35);
      text-decoration: none;
      transition: color 0.2s;
    }
    .counter-footer a:hover { color: rgba(255,255,255,0.65); }

    @media (max-width: 480px) {
      .counter-logo { width: 72px; height: 72px; margin-bottom: 20px; }
      .counter-days-label { margin-bottom: 28px; }
    }
  </style>
</head>
<body>

  <div class="bg-blob bg-blob-1"></div>
  <div class="bg-blob bg-blob-2"></div>
  <div class="bg-blob bg-blob-3"></div>

  <div class="counter-wrap">
    <img src="assets/logo.png" alt="Tradeitto" class="counter-logo" />

    <div id="counterMain">
      <p class="counter-label">Faltan</p>
      <p class="counter-days" id="daysNum">--</p>
      <p class="counter-days-label" id="daysText">días</p>
      <div class="counter-date">
        <span class="counter-date-dot"></span>
        7 de junio · 2026 · Bilbao
      </div>
      <a href="index.html" class="counter-cta">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="15" height="15"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        Ver la web completa
      </a>
    </div>

    <p class="counter-started" id="counterStarted" style="display:none">
      ¡El evento ha comenzado! 🎉
    </p>
  </div>

  <footer class="counter-footer">
    <a href="index.html">Tradeitto</a> · Evento TCG · Bilbao 2026
  </footer>

  <script>
    // 7 de junio de 2026 a las 10:00 hora Madrid (CEST = UTC+2)
    var TARGET = new Date('2026-06-07T08:00:00Z');

    var elNum    = document.getElementById('daysNum');
    var elText   = document.getElementById('daysText');
    var elMain   = document.getElementById('counterMain');
    var elStarted = document.getElementById('counterStarted');

    function tick() {
      var diff = TARGET.getTime() - Date.now();
      if (diff <= 0) {
        elMain.style.display = 'none';
        elStarted.style.display = 'block';
        clearInterval(timer);
        return;
      }
      var days = Math.ceil(diff / 86400000);
      elNum.textContent = days;
      elText.textContent = days === 1 ? 'día' : 'días';
    }

    tick();
    var timer = setInterval(tick, 60000);
  </script>
</body>
</html>
